version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./002_schema_improvements.sql:/docker-entrypoint-initdb.d/002_schema_improvements.sql:ro
      - ./003_student_activity_indexes.sql:/docker-entrypoint-initdb.d/003_student_activity_indexes.sql:ro
      - ./004_seed_data.sql:/docker-entrypoint-initdb.d/004_seed_data.sql:ro

  backend:
    build: ./server
    container_name: crm_backend
    restart: always
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://crm:crm@postgres:5432/crm
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build: ./admin
    container_name: crm_admin
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./admin:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data:
